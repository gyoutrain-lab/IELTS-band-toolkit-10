<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Unified Lexical Architect</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; max-width: 950px; margin: 20px auto; padding: 20px; background: #f4f7f6; }
        .block { background: #fff; padding: 25px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .segment { display: inline-block; padding: 8px; margin: 3px; border-bottom: 3px solid #3498db; cursor: pointer; font-weight: 500; }
        .segment.upgraded { border-bottom-color: #27ae60; background: #e8f8f0; }
        .option-box { background: #f9f9f9; padding: 15px; border-radius: 8px; border-left: 4px solid #3498db; margin: 20px 0; min-height: 50px; }
        .btn { background: #2c3e50; color: white; padding: 8px 16px; border: none; border-radius: 4px; cursor: pointer; margin: 5px; }
        .nav-btn { background: #34495e; color: white; padding: 12px 20px; border: none; border-radius: 6px; cursor: pointer; margin-top: 10px; }
        #finalOutput { width: 100%; height: 80px; margin-top: 10px; padding: 10px; border: 1px solid #ddd; }
    </style>
</head>
<body>
    <h1>Lexical Architect: Unified IELTS Drill</h1>
    <div class="block">
        <label><strong>1. Competency:</strong></label>
        <select id="compSelect" onchange="resetAll()">
            <option value="inversion">1. Inversions</option>
            <option value="subjunctive">2. Advanced Subjunctive</option>
            <option value="register">3. Academic Register</option>
            <option value="connectors">4. Logical Connectors</option>
        </select>

        <p><strong>2. Build:</strong></p>
        <div id="sentenceBuilder"></div>
        <div id="options" class="option-box">Click a segment to see options.</div>

        <p><strong>3. Review & Submit:</strong></p>
        <textarea id="finalOutput" readonly></textarea>
        <br>
        <button class="nav-btn" onclick="scoreResult()">Submit for Audit</button>
        <button class="nav-btn" style="background:#7f8c8d" onclick="nextPrompt()">Next Prompt</button>
        <div id="scoreDisplay" style="margin-top:15px; font-weight:bold;"></div>
    </div>

    <script>
        // Centralized Data Repository
        const masterData = {
            inversion: [
                [["If policy", {"Should policy": "Band 9", "If policy": "Band 7"}], ["fails,", {"prove ineffective,": "Band 9", "fail,": "Band 7"}], ["the society", {"the populace": "Band 9", "the society": "Band 7"}], ["suffers.", {"incurs detriment.": "Band 9", "is affected.": "Band 7"}]],
                [["If education", {"Should educational provision": "Band 9", "If education": "Band 7"}], ["is cut,", {"be curtailed,": "Band 9", "be reduced,": "Band 7"}], ["the future", {"the long-term viability": "Band 9", "the future": "Band 7"}], ["is at risk.", {"is jeopardized.": "Band 9", "is at risk.": "Band 7"}]]
            ],
            // Add remaining 8 prompts per category here...
            subjunctive: [ /* Add 10 prompts */ ],
            register: [ /* Add 10 prompts */ ],
            connectors: [ /* Add 10 prompts */ ]
        };

        let currentComp = 'inversion', currentIdx = 0, activeState = [];

        function resetAll() {
            currentIdx = 0;
            renderPrompt();
        }

        function renderPrompt() {
            // Synchronize State
            activeState = masterData[document.getElementById('compSelect').value][currentIdx].map(item => ({
                text: item[0],
                options: item[1],
                isBand9: false
            }));
            document.getElementById('options').innerHTML = "Click a segment to see options.";
            document.getElementById('scoreDisplay').innerText = "";
            updateUI();
        }

        function updateUI() {
            const builder = document.getElementById('sentenceBuilder');
            builder.innerHTML = '';
            activeState.forEach((item, i) => {
                const s = document.createElement('span');
                s.className = 'segment ' + (item.isBand9 ? 'upgraded' : '');
                s.innerText = item.text;
                s.onclick = () => showOptions(i);
                builder.appendChild(s);
            });
            document.getElementById('finalOutput').value = activeState.map(i => i.text).join(' ');
        }

        function showOptions(i) {
            const box = document.getElementById('options');
            box.innerHTML = `<strong>Options:</strong><br>`;
            Object.keys(activeState[i].options).forEach(opt => {
                const btn = document.createElement('button');
                btn.className = 'btn';
                btn.innerText = `${opt} (${activeState[i].options[opt]})`;
                btn.onclick = () => {
                    activeState[i].text = opt;
                    activeState[i].isBand9 = (activeState[i].options[opt] === "Band 9");
                    updateUI();
                };
                box.appendChild(btn);
            });
        }

        function nextPrompt() {
            const comp = document.getElementById('compSelect').value;
            currentIdx = (currentIdx + 1) % masterData[comp].length;
            renderPrompt();
        }

        function scoreResult() {
            const allBand9 = activeState.every(item => item.isBand9);
            document.getElementById('scoreDisplay').innerText = allBand9 ? "AUDIT: Band 9 Mastered!" : "AUDIT: Incomplete. Upgrade all segments.";
            document.getElementById('scoreDisplay').style.color = allBand9 ? "#27ae60" : "#c0392b";
        }

        // Initialize
        renderPrompt();
    </script>
</body>
</html>
