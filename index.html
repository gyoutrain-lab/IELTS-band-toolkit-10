<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Integrated Band 9 Lexical Architect</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; max-width: 950px; margin: 20px auto; padding: 20px; background: #f4f7f6; }
        .block { background: #fff; padding: 25px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .segment { display: inline-block; padding: 8px; margin: 3px; border-bottom: 3px solid #3498db; cursor: pointer; color: #2c3e50; font-weight: 500; }
        .segment:hover { background: #eef7ff; }
        .option-box { background: #f9f9f9; padding: 15px; border-radius: 8px; border-left: 4px solid #27ae60; margin: 20px 0; }
        .btn { background: #2c3e50; color: white; padding: 8px 16px; border: none; border-radius: 4px; cursor: pointer; margin: 5px; }
        .nav-btn { background: #34495e; color: white; padding: 12px 20px; border: none; border-radius: 6px; cursor: pointer; margin-top: 10px; }
        #finalOutput { width: 100%; height: 60px; margin-top: 10px; font-size: 1.1em; padding: 10px; border: 1px solid #ddd; }
    </style>
</head>
<body>
    <h1>Lexical Architect: IELTS Band 9 Drill</h1>
    <div class="block">
        <label><strong>1. Competency:</strong></label>
        <select id="compSelect" onchange="loadNewPrompt()">
            <option value="inversion">1. Inversions</option>
            <option value="subjunctive">2. Advanced Subjunctive</option>
            <option value="register">3. Academic Register</option>
            <option value="connectors">4. Logical Connectors</option>
        </select>

        <p><strong>2. Build (Click segments to upgrade):</strong></p>
        <div id="sentenceBuilder"></div>

        <div id="options" class="option-box">Click a segment to choose Band 9 alternatives.</div>

        <p><strong>3. Review & Submit:</strong></p>
        <textarea id="finalOutput" readonly></textarea>
        <br>
        <button class="nav-btn" onclick="scoreResult()">Submit for Audit</button>
        <button class="nav-btn" style="background:#7f8c8d" onclick="nextPrompt()">Next Prompt</button>
        <div id="scoreDisplay" style="margin-top:15px; font-weight:bold;"></div>
    </div>

    <script>
        // Library structure: 15 prompts per competency
        const data = {
            inversion: [
                [["If clinical negligence", {"Should clinical malpractice": "Band 9"}], ["persists,", {"endure,": "Band 7"}], ["the hospital", {"the institution": "Band 9"}], ["faces", {"is subjected to": "Band 9"}], ["major lawsuits.", {"severe litigious repercussions.": "Band 9"}]],
                [["If modern training", {"Should pedagogical innovation": "Band 9"}], ["is ignored,", {"be neglected,": "Band 7"}], ["the care standard", {"the clinical quality": "Band 9"}], ["falls.", {"is compromised.": "Band 9"}]],
                // ... (Truncated for space, you can add up to 15 items here)
            ],
            subjunctive: [
                [["If the hospital", {"Were the medical facility": "Band 9"}], ["had", {"to be endowed with": "Band 9"}], ["enough budget,", {"adequate fiscal resources,": "Band 9"}], ["the crisis", {"the systemic exigency": "Band 9"}], ["would end.", {"would be alleviated.": "Band 9"}]],
                [["If staff", {"Were the clinical personnel": "Band 9"}], ["were motivated,", {"adequately incentivized,": "Band 9"}], ["productivity", {"operational throughput": "Band 9"}], ["would rise.", {"would be optimized.": "Band 9"}]],
            ],
            register: [
                [["The nurse", {"The healthcare practitioner": "Band 9"}], ["did a lot", {"undertook rigorous intervention": "Band 9"}], ["to help", {"to facilitate": "Band 9"}], ["the patient.", {"the subject's recovery.": "Band 9"}]],
                [["The hospital", {"The clinical facility": "Band 9"}], ["is good at", {"demonstrates proficiency in": "Band 9"}], ["making things go right.", {"optimizing patient outcomes.": "Band 9"}]],
            ],
            connectors: [
                [["Automation", {"Technological automation": "Band 9"}], ["replaces labor,", {"supplants manual work,"}], ["it also", {"furthermore,"}], ["raises issues.", {"precipitates ethical dilemmas."}]],
                [["Medical tourism", {"Global medical tourism": "Band 9"}], ["is increasing,", {"is expanding exponentially,"}], ["a source of revenue.", {"a lucrative mechanism for capital."}]],
            ]
        };

        let currentComp = 'inversion';
        let currentIdx = 0;
        let activeSentence = [];

        function loadNewPrompt() {
            currentComp = document.getElementById('compSelect').value;
            currentIdx = 0;
            renderSentence();
        }

        function renderSentence() {
            activeSentence = JSON.parse(JSON.stringify(data[currentComp][currentIdx]));
            const builder = document.getElementById('sentenceBuilder');
            builder.innerHTML = '';
            activeSentence.forEach((seg, i) => {
                const s = document.createElement('span');
                s.className = 'segment';
                s.innerText = seg[0];
                s.onclick = () => showOptions(i);
                builder.appendChild(s);
            });
            updateFinal();
        }

        function showOptions(i) {
            const opts = activeSentence[i][1];
            const box = document.getElementById('options');
            box.innerHTML = `<strong>Upgrade "${activeSentence[i][0]}":</strong><br>`;
            for(let word in opts) {
                box.innerHTML += `<button class="btn" onclick="replace(${i}, '${word}')">${word} (${opts[word]})</button>`;
            }
        }

        function replace(i, word) {
            activeSentence[i][0] = word;
            renderSentence();
        }

        function updateFinal() {
            document.getElementById('finalOutput').value = activeSentence.map(s => s[0]).join(' ');
        }

        function nextPrompt() {
            currentIdx = (currentIdx + 1) % data[currentComp].length;
            renderSentence();
        }

        function scoreResult() {
            const output = document.getElementById('finalOutput').value;
            const scoreDiv = document.getElementById('scoreDisplay');
            const isBand9 = output.length > 50 && !output.includes('good') && !output.includes('helping');
            scoreDiv.innerText = isBand9 ? "AUDIT RESULT: Band 9 (Masterful Construction)" : "AUDIT RESULT: Band 6 (Requires further lexical upgrades)";
            scoreDiv.style.color = isBand9 ? "#27ae60" : "#c0392b";
        }

        loadNewPrompt();
    </script>
</body>
</html>
