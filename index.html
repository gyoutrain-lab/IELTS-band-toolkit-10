<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Functional Band 9 Lexical Architect</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; max-width: 950px; margin: 20px auto; padding: 20px; background: #f4f7f6; }
        .block { background: #fff; padding: 25px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .segment { display: inline-block; padding: 8px; margin: 3px; border-bottom: 3px solid #3498db; cursor: pointer; color: #2c3e50; font-weight: 500; transition: 0.3s; }
        .segment.upgraded { border-bottom-color: #27ae60; background: #e8f8f0; }
        .segment:hover { background: #eef7ff; }
        .option-box { background: #f9f9f9; padding: 15px; border-radius: 8px; border-left: 4px solid #3498db; margin: 20px 0; }
        .btn { background: #2c3e50; color: white; padding: 8px 16px; border: none; border-radius: 4px; cursor: pointer; margin: 5px; }
        .nav-btn { background: #34495e; color: white; padding: 12px 20px; border: none; border-radius: 6px; cursor: pointer; margin-top: 10px; }
        #finalOutput { width: 100%; height: 80px; margin-top: 10px; padding: 10px; border: 1px solid #ddd; border-radius: 4px; }
    </style>
</head>
<body>
    <h1>Lexical Architect: Interactive Band 9 Drill</h1>
    <div class="block">
        <label><strong>1. Competency:</strong></label>
        <select id="compSelect" onchange="loadNewPrompt()">
            <option value="inversion">1. Inversions</option>
            <option value="subjunctive">2. Advanced Subjunctive</option>
            <option value="register">3. Academic Register</option>
            <option value="connectors">4. Logical Connectors</option>
        </select>

        <p><strong>2. Build (Click segments to upgrade):</strong></p>
        <div id="sentenceBuilder"></div>

        <div id="options" class="option-box">Select a blue segment above to see advanced alternatives.</div>

        <p><strong>3. Review & Submit:</strong></p>
        <textarea id="finalOutput" readonly></textarea>
        <br>
        <button class="nav-btn" onclick="scoreResult()">Submit for Audit</button>
        <button class="nav-btn" style="background:#7f8c8d" onclick="nextPrompt()">Next Prompt</button>
        <div id="scoreDisplay" style="margin-top:15px; font-weight:bold;"></div>
    </div>

    <script>
        const data = {
            inversion: [
                [["If clinical negligence", {"Should clinical malpractice": "Band 9"}], ["persists,", {"endure,": "Band 9"}], ["the hospital", {"the institution": "Band 9"}], ["faces", {"is subjected to": "Band 9"}], ["major lawsuits.", {"severe litigious repercussions.": "Band 9"}]]
            ],
            subjunctive: [
                [["If the hospital", {"Were the medical facility": "Band 9"}], ["had", {"to be endowed with": "Band 9"}], ["enough budget,", {"adequate fiscal resources,": "Band 9"}], ["the crisis", {"the systemic exigency": "Band 9"}], ["would end.", {"would be alleviated.": "Band 9"}]]
            ],
            // Add other categories...
        };

        let currentComp = 'inversion', currentIdx = 0, activeData = [];

        function loadNewPrompt() {
            currentComp = document.getElementById('compSelect').value;
            currentIdx = 0;
            renderBuilder();
        }

        function renderBuilder() {
            activeData = data[currentComp][currentIdx].map(item => ({ original: item[0], current: item[0], options: item[1], isUpgraded: false }));
            updateUI();
        }

        function updateUI() {
            const builder = document.getElementById('sentenceBuilder');
            builder.innerHTML = '';
            activeData.forEach((item, i) => {
                const s = document.createElement('span');
                s.className = 'segment' + (item.isUpgraded ? ' upgraded' : '');
                s.innerText = item.current;
                s.onclick = () => showOptions(i);
                builder.appendChild(s);
            });
            document.getElementById('finalOutput').value = activeData.map(i => i.current).join(' ');
        }

        function showOptions(i) {
            const box = document.getElementById('options');
            box.innerHTML = `<strong>Upgrade "${activeData[i].current}":</strong><br>`;
            Object.keys(activeData[i].options).forEach(opt => {
                const btn = document.createElement('button');
                btn.className = 'btn';
                btn.innerText = opt;
                btn.onclick = () => {
                    activeData[i].current = opt;
                    activeData[i].isUpgraded = true;
                    updateUI();
                };
                box.appendChild(btn);
            });
        }

        function scoreResult() {
            const allUpgraded = activeData.every(item => item.isUpgraded);
            const scoreDiv = document.getElementById('scoreDisplay');
            scoreDiv.innerText = allUpgraded ? "AUDIT RESULT: Band 9 Achieved!" : "AUDIT RESULT: Incomplete. Upgrade all segments first.";
            scoreDiv.style.color = allUpgraded ? "#27ae60" : "#c0392b";
        }

        function nextPrompt() { /* logic to increment currentIdx */ }
        loadNewPrompt();
    </script>
</body>
</html>
