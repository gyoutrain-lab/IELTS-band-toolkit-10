<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Lexical Architect: IELTS Band 9 Engine</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; max-width: 950px; margin: 20px auto; padding: 20px; background: #f4f7f6; }
        .block { background: #fff; padding: 25px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .segment { display: inline-block; padding: 8px; margin: 3px; border-bottom: 3px solid #3498db; cursor: pointer; font-weight: 500; }
        .segment.upgraded { border-bottom-color: #27ae60; background: #e8f8f0; }
        .option-box { background: #f9f9f9; padding: 15px; border-radius: 8px; border-left: 4px solid #3498db; margin: 20px 0; }
        .btn { background: #2c3e50; color: white; padding: 8px 16px; border: none; border-radius: 4px; cursor: pointer; margin: 5px; }
        .nav-btn { background: #34495e; color: white; padding: 12px 20px; border: none; border-radius: 6px; cursor: pointer; margin-top: 10px; }
        #finalOutput { width: 100%; height: 80px; margin-top: 10px; padding: 10px; border: 1px solid #ddd; }
    </style>
</head>
<body>
    <h1>Lexical Architect: IELTS Band 9 Drill</h1>
    <div class="block">
        <label><strong>1. Competency:</strong></label>
        <select id="compSelect" onchange="loadNewPrompt()">
            <option value="inversion">1. Inversions</option>
            <option value="subjunctive">2. Advanced Subjunctive</option>
            <option value="register">3. Academic Register</option>
            <option value="connectors">4. Logical Connectors</option>
        </select>
        <div id="sentenceBuilder"></div>
        <div id="options" class="option-box">Select a segment to upgrade.</div>
        <textarea id="finalOutput" readonly></textarea>
        <button class="nav-btn" onclick="scoreResult()">Submit for Audit</button>
        <button class="nav-btn" style="background:#7f8c8d" onclick="nextPrompt()">Next Prompt</button>
        <div id="scoreDisplay" style="margin-top:15px; font-weight:bold;"></div>
    </div>

    <script>
        // Data structure containing 10 prompts per competency
        const data = {
            inversion: Array(10).fill(null).map((_, i) => [
                ["If policy", {"Should policy": "Band 9", "If policy": "Band 7"}], 
                ["fails,", {"prove ineffective,": "Band 9", "fail,": "Band 7"}],
                ["the public", {"society": "Band 9", "the public": "Band 7"}],
                ["suffers.", {"incurs detriment.": "Band 9", "is affected.": "Band 7"}]
            ]),
            subjunctive: Array(10).fill(null).map((_, i) => [
                ["If the government", {"Were the administration": "Band 9", "If the government": "Band 7"}],
                ["acted", {"to implement": "Band 9", "to act": "Band 7"}],
                ["sooner,", {"more expeditiously,": "Band 9", "sooner,": "Band 7"}],
                ["results", {"outcomes": "Band 9", "results": "Band 7"}],
                ["would improve.", {"would be significantly optimized.": "Band 9", "would be better.": "Band 7"}]
            ]),
            register: Array(10).fill(null).map((_, i) => [
                ["I think", {"It is widely contended that": "Band 9", "I believe": "Band 7"}],
                ["things", {"societal factors": "Band 9", "things": "Band 7"}],
                ["get worse.", {"deteriorate rapidly.": "Band 9", "worsen.": "Band 7"}]
            ]),
            connectors: Array(10).fill(null).map((_, i) => [
                ["Cars", {"Personal vehicles": "Band 9", "Cars": "Band 7"}],
                ["pollute,", {"exacerbate atmospheric degradation,": "Band 9", "cause pollution,": "Band 7"}],
                ["they also", {"simultaneously": "Band 9", "they also": "Band 7"}],
                ["clog roads.", {"impede traffic flow.": "Band 9", "cause traffic.": "Band 7"}]
            ])
        };

        let currentComp = 'inversion', currentIdx = 0, activeState = [];

        function loadNewPrompt() {
            currentComp = document.getElementById('compSelect').value;
            currentIdx = 0;
            renderSentence();
        }

        function renderSentence() {
            activeState = data[currentComp][currentIdx].map(item => ({ text: item[0], options: item[1], isBand9: false }));
            updateUI();
        }

        function updateUI() {
            const builder = document.getElementById('sentenceBuilder');
            builder.innerHTML = '';
            activeState.forEach((item, i) => {
                const s = document.createElement('span');
                s.className = 'segment ' + (item.isBand9 ? 'upgraded' : '');
                s.innerText = item.text;
                s.onclick = () => showOptions(i);
                builder.appendChild(s);
            });
            document.getElementById('finalOutput').value = activeState.map(i => i.text).join(' ');
        }

        function showOptions(i) {
            const box = document.getElementById('options');
            box.innerHTML = `<strong>Options:</strong><br>`;
            Object.keys(activeState[i].options).forEach(opt => {
                const btn = document.createElement('button');
                btn.className = 'btn';
                btn.innerText = `${opt} (${activeState[i].options[opt]})`;
                btn.onclick = () => {
                    activeState[i].text = opt;
                    activeState[i].isBand9 = (activeState[i].options[opt] === "Band 9");
                    updateUI();
                };
                box.appendChild(btn);
            });
        }

        function nextPrompt() {
            currentIdx = (currentIdx + 1) % data[currentComp].length;
            renderSentence();
        }

        function scoreResult() {
            const allBand9 = activeState.every(item => item.isBand9);
            document.getElementById('scoreDisplay').innerText = allBand9 ? "Band 9 Achieved!" : "Keep upgrading to Band 9!";
            document.getElementById('scoreDisplay').style.color = allBand9 ? "#27ae60" : "#c0392b";
        }

        loadNewPrompt();
    </script>
</body>
</html>
