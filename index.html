<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Functional Band 9 Lexical Architect</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; max-width: 950px; margin: 20px auto; padding: 20px; background: #f4f7f6; }
        .block { background: #fff; padding: 25px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .segment { display: inline-block; padding: 8px; margin: 3px; border-bottom: 3px solid #3498db; cursor: pointer; font-weight: 500; }
        .segment.upgraded { border-bottom-color: #27ae60; }
        .option-box { background: #f9f9f9; padding: 15px; border-radius: 8px; border-left: 4px solid #3498db; margin: 20px 0; }
        .btn { background: #2c3e50; color: white; padding: 8px 16px; border: none; border-radius: 4px; cursor: pointer; margin: 5px; }
        .nav-btn { background: #34495e; color: white; padding: 12px 20px; border: none; border-radius: 6px; cursor: pointer; margin-top: 10px; }
        #finalOutput { width: 100%; height: 80px; margin-top: 10px; padding: 10px; border: 1px solid #ddd; background: #fff; }
    </style>
</head>
<body>
    <h1>Lexical Architect: Interactive Band 9 Drill</h1>
    <div class="block">
        <label><strong>1. Competency:</strong></label>
        <select id="compSelect" onchange="loadNewPrompt()">
            <option value="inversion">1. Inversions</option>
            <option value="subjunctive">2. Advanced Subjunctive</option>
            <option value="register">3. Academic Register</option>
            <option value="connectors">4. Logical Connectors</option>
        </select>

        <p><strong>2. Build:</strong></p>
        <div id="sentenceBuilder"></div>
        <div id="options" class="option-box">Select a segment to upgrade.</div>

        <p><strong>3. Review & Submit:</strong></p>
        <textarea id="finalOutput" readonly placeholder="Your built sentence will appear here..."></textarea>
        <br>
        <button class="nav-btn" onclick="scoreResult()">Submit for Audit</button>
        <button class="nav-btn" style="background:#7f8c8d" onclick="nextPrompt()">Next Prompt</button>
        <div id="scoreDisplay" style="margin-top:15px; font-weight:bold;"></div>
    </div>

    <script>
        const data = {
            inversion: [[["If clinical negligence", {"Should clinical malpractice": "Band 9", "If clinical errors": "Band 7"}], ["persists,", {"endure,": "Band 9", "continue,": "Band 7"}]]],
            subjunctive: [[["If the hospital", {"Were the medical facility": "Band 9", "If the facility": "Band 7"}], ["had", {"to be endowed with": "Band 9", "possessed": "Band 7"}]]],
            register: [[["The nurse", {"The healthcare practitioner": "Band 9", "The medical staff": "Band 7"}], ["did a lot", {"undertook rigorous intervention": "Band 9", "worked extensively": "Band 7"}]]],
            connectors: [[["Automation", {"Technological automation": "Band 9", "Modern tech": "Band 7"}], ["replaces labor,", {"supplants manual work,": "Band 9", "replaces tasks,": "Band 7"}]]]
        };

        let currentComp = 'inversion', currentIdx = 0, activeState = [];

        function loadNewPrompt() {
            currentComp = document.getElementById('compSelect').value;
            currentIdx = 0;
            renderSentence();
        }

        function renderSentence() {
            activeState = data[currentComp][currentIdx].map(item => ({
                text: item[0],
                options: item[1],
                isBand9: false
            }));
            updateUI();
        }

        function updateUI() {
            const builder = document.getElementById('sentenceBuilder');
            builder.innerHTML = '';
            activeState.forEach((item, i) => {
                const s = document.createElement('span');
                s.className = 'segment ' + (item.isBand9 ? 'upgraded' : '');
                s.innerText = item.text;
                s.onclick = () => showOptions(i);
                builder.appendChild(s);
            });
            document.getElementById('finalOutput').value = activeState.map(i => i.text).join(' ');
        }

        function showOptions(i) {
            const box = document.getElementById('options');
            box.innerHTML = `<strong>Options for segment ${i+1}:</strong><br>`;
            for (let option in activeState[i].options) {
                const btn = document.createElement('button');
                btn.className = 'btn';
                btn.innerText = `${option} (${activeState[i].options[option]})`;
                btn.onclick = () => {
                    activeState[i].text = option;
                    activeState[i].isBand9 = (activeState[i].options[option] === "Band 9");
                    updateUI();
                };
                box.appendChild(btn);
            }
        }

        function nextPrompt() {
            currentIdx = (currentIdx + 1) % data[currentComp].length;
            renderSentence();
        }

        function scoreResult() {
            const allBand9 = activeState.every(item => item.isBand9);
            const scoreDiv = document.getElementById('scoreDisplay');
            scoreDiv.innerText = allBand9 ? "AUDIT RESULT: Band 9 Excellence!" : "AUDIT RESULT: Please upgrade all segments to Band 9.";
            scoreDiv.style.color = allBand9 ? "#27ae60" : "#c0392b";
        }

        loadNewPrompt();
    </script>
</body>
</html>
